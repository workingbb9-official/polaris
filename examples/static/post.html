<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Polaris</h1>
        <h2>Send a Message</h2>
        <form method="POST" action="/post">
            <textarea name="message" placeholder="Type your message here..." 
                style="background:#0b0e14; color:#e0e6ed; border:1px solid #1e293b; 
                border-radius:6px; padding:10px; width:300px; height:120px; resize:none;">
            </textarea>
            <br><br>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
